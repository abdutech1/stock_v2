name: CI Pipeline (The Robot)

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master, develop ]

jobs:
  test-and-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js 22
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: 'npm'                    # Now safe because package-lock.json exists

      - name: Install dependencies
        run: npm ci                       # Faster and cleaner with lock file

      - name: Prisma Generate
        run: npx prisma generate

      - name: Lint (if you have lint script)
        run: npm run lint --if-present

      - name: Build (if using TypeScript)
        run: npm run build --if-present

      # === Test MySQL Database ===
      - name: Start MySQL Test Database
        uses: mirromutth/mysql-action@v1
        with:
          mysql version: '8.0'
          mysql root password: 'root'
          mysql database: 'test_saas_db'

      - name: Run Prisma DB Setup
        run: npx prisma db push --accept-data-loss
        env:
          DATABASE_URL: "mysql://root:root@localhost:3306/test_saas_db"

      # === Run Tests ===
      - name: Run tests
        run: npm test --if-present
        env:
          DATABASE_URL: "mysql://root:root@localhost:3306/test_saas_db"
          JWT_SECRET: "test-secret-for-ci-only"

      - name: Summary
        if: always()
        run: echo "✅ CI Pipeline finished successfully!"
