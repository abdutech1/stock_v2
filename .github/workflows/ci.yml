name: CI Pipeline (The Robot)

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master, develop ]

jobs:
  test-and-build:
    runs-on: ubuntu-latest

    # MySQL Database Service for CI
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: test_saas_db
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      # ========================
      # Backend Steps (Monorepo)
      # ========================
      - name: Install dependencies
        working-directory: ./backend
        run: npm ci

      - name: Generate Prisma Client
        working-directory: ./backend
        run: npx prisma generate
        env:
          DATABASE_URL: "mysql://root:root@127.0.0.1:3306/test_saas_db"

      - name: Wait for MySQL to be ready
        run: |
          echo "Waiting for MySQL..."
          until mysqladmin ping -h 127.0.0.1 -P 3306 --silent; do
            sleep 2
          done
          echo "✅ MySQL is ready!"

      - name: Run Prisma DB Setup
        working-directory: ./backend
        run: npx prisma db push --accept-data-loss
        env:
          DATABASE_URL: "mysql://root:root@127.0.0.1:3306/test_saas_db"

      - name: Lint
        working-directory: ./backend
        run: npm run lint --if-present

      - name: Build (TypeScript)
        working-directory: ./backend
        run: npm run build --if-present

      - name: Run tests
        working-directory: ./backend
        run: echo "⏭️ Tests skipped for now (enable when ready)"

      - name: Summary
        if: always()
        run: echo "✅ CI Pipeline completed successfully!"
