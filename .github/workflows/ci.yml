name: CI Pipeline (The Robot)

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master, develop ]

jobs:
  test-and-build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [20.x]   # You can add 22.x later if needed

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'          # This speeds up future runs

      - name: Install dependencies
        run: npm ci             # Clean install (better than npm install)

      - name: Prisma Generate
        run: npx prisma generate

      - name: Lint (if you have lint script)
        run: npm run lint --if-present

      - name: Build
        run: npm run build --if-present

      # === Test Database Setup (MySQL in GitHub Actions) ===
      - name: Start MySQL Test Database
        uses: mirromutth/mysql-action@v1
        with:
          mysql version: '8.0'
          mysql root password: 'root'
          mysql database: 'test_saas_db'

      - name: Run Prisma DB Setup for Tests
        run: |
          npx prisma db push --accept-data-loss   # Or use prisma migrate deploy if you have migrations
        env:
          DATABASE_URL: "mysql://root:root@localhost:3306/test_saas_db?schema=public"

      # === Run Tests ===
      - name: Run tests
        run: npm test --if-present
        env:
          DATABASE_URL: "mysql://root:root@localhost:3306/test_saas_db?schema=public"
          JWT_SECRET: "test-secret-for-ci-only"
          # Add other env vars your tests need here

      - name: Summary
        if: always()
        run: echo "✅ CI finished! Check above for details."
