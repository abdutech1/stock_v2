name: CI Pipeline (The Robot)

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master, develop ]

jobs:
  test-and-build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [22.x]   # Updated to a stable modern version

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install dependencies
        run: npm install          # Changed from npm ci to avoid lock file error

      - name: Prisma Generate
        run: npx prisma generate

      - name: Lint (if you have it)
        run: npm run lint --if-present

      - name: Build (if using TypeScript)
        run: npm run build --if-present

      # === Test MySQL Database ===
      - name: Start MySQL Test Database
        uses: mirromutth/mysql-action@v1
        with:
          mysql version: '8.0'
          mysql root password: 'root'
          mysql database: 'test_saas_db'

      - name: Run Prisma DB Setup
        run: npx prisma db push --accept-data-loss
        env:
          DATABASE_URL: "mysql://root:root@localhost:3306/test_saas_db"

      # === Run Tests ===
      - name: Run tests
        run: npm test --if-present
        env:
          DATABASE_URL: "mysql://root:root@localhost:3306/test_saas_db"
          JWT_SECRET: "test-secret-for-ci-only"

      - name: Summary
        if: always()
        run: echo "✅ CI Pipeline finished! Check the steps above for details."
